  { name: "신예린", team: "디자인팀",   initial: "예", pos: "매니저" },
  { name: "조하늘", team: "마케팅팀",   initial: "하", pos: "책임" },
];

// 7 sticker types — user-spec list with descriptions
const STICKERS = [
  { id: "wave",       nm: "같은주파수",     desc: "우리 잘 통하는 것 같아요",
    bg: "linear-gradient(135deg, #FF6B5A, #FBBF24)",
    svg: <path d="M3 12c2-4 4-4 6 0s4 4 6 0 4-4 6 0" /> },
  { id: "awkward",    nm: "어색ing",        desc: "아직 어색하지만 더 소통하고 싶어요",
    bg: "linear-gradient(135deg, #A78BFA, #C4B5FD)",
    svg: <><circle cx="9" cy="10" r="1.2" fill="currentColor"/><circle cx="15" cy="10" r="1.2" fill="currentColor"/><path d="M8 16c2-1 6-1 8 0"/></> },
  { id: "translate",  nm: "번역필요",       desc: "서로 이해안되는 부분 있지만 조심히 번역하고 있어요",
    bg: "linear-gradient(135deg, #60A5FA, #A78BFA)",
    svg: <><path d="M4 6h7M7 4v2M5 10c1 3 3 4 5 4M11 12c-1-2-2-4-2-6"/><path d="M14 20l4-10 4 10M15.5 17h5"/></> },
  { id: "atm",        nm: "정보ATM",        desc: "늘 신속한 정보/찌라시 고마워요",
    bg: "linear-gradient(135deg, #34D399, #60A5FA)",
    svg: <><rect x="4" y="6" width="16" height="12" rx="2"/><path d="M8 11h8M8 14h5"/></> },
  { id: "fountain",   nm: "의견분수",       desc: "소소한 의견이라도 많이 던져줘서 도움되요",
    bg: "linear-gradient(135deg, #FBBF24, #FF6B5A)",
    svg: <><path d="M12 3v18M8 7l4-4 4 4M5 12c2 1 4 1 7 1s5 0 7-1M7 17c1 1 3 1 5 1s4 0 5-1"/></> },
  { id: "blindspot",  nm: "사각지대메이트", desc: "나와 다른 관점 덕에 업무빈칸을 채웠어요",
    bg: "linear-gradient(135deg, #F472B6, #A78BFA)",
    svg: <><circle cx="12" cy="12" r="8"/><path d="M12 4v8h8"/><circle cx="9" cy="14" r="1.5" fill="currentColor"/></> },
  { id: "ndim",       nm: "N차원솔루션",    desc: "다른 차원의 사람같지만, 남다른 선두주자",
    bg: "linear-gradient(135deg, #818CF8, #34D399)",
    svg: <><path d="M12 2 14 8l6 2-6 2-2 6-2-6-6-2 6-2z" fill="currentColor"/></> },
];

const StickerSVG = ({ s, size = 22 }) => (
  <svg viewBox="0 0 24 24" width={size} height={size} fill="none" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" style={{color:"#fff"}}>
    {s.svg}
  </svg>
);

// ---------- main panel ----------
function PickerPanel() {
  const [chances, setChances] = useState(3);
  const [slots, setSlots] = useState([null, null, null]);
  const [isSpinning, setIsSpinning] = useState(false);
  const [activeSlot, setActiveSlot] = useState(0);
  const [selectedStickers, setSelectedStickers] = useState({});
  const [submitted, setSubmitted] = useState({});

  // Compute: has user submitted at least once today? (hard daily-limit lock)
  const hasSubmittedToday = [0, 1, 2].some(i => submitted[i]);

  // Pick: spin all 3 slots together with random employees, one chance used
  const pick = () => {
    if (hasSubmittedToday) {
      if (window.showToast) window.showToast("스티커를 전달완료하였습니다. 내일 다시 가능합니다.");
      return;
    }
    if (chances <= 0) {
      if (window.showToast) window.showToast("오늘 스티커 붙이기를 완료하셨습니다. 내일 다시 가능합니다.");
      return;
    }
    if (isSpinning) return;
    setIsSpinning(true);
    let cycles = 0;
    const interval = setInterval(() => {
      const shuffled = [...POOL].sort(() => Math.random() - 0.5);
      const next = [shuffled[0], shuffled[1], shuffled[2]];
      setSlots(next);
      cycles++;
      if (cycles > 14) {
        clearInterval(interval);
        setIsSpinning(false);
        setChances(c => c - 1);
        setActiveSlot(0);
        setSelectedStickers({});
        setSubmitted({});
      }
    }, 70);
  };

  const toggleSticker = (sid) => {
    if (slots[activeSlot] == null) return;
    if (submitted[activeSlot]) return;
    const cur = selectedStickers[activeSlot] || [];
    if (cur.includes(sid)) {
      setSelectedStickers({ ...selectedStickers, [activeSlot]: cur.filter(x => x !== sid) });
    } else if (cur.length < 3) {
      setSelectedStickers({ ...selectedStickers, [activeSlot]: [...cur, sid] });
    }
  };

  // Submit ALL 3 slots together (instead of one at a time)
  const submitAll = () => {
    let count = 0;
    const nextSubmitted = { ...submitted };
    [0, 1, 2].forEach(i => {
      if (slots[i] && (selectedStickers[i] || []).length > 0 && !submitted[i]) {
        nextSubmitted[i] = true;
        count++;
      }
    });
    if (count === 0) return;
    setSubmitted(nextSubmitted);
    // Award +300P only ONCE per day regardless of how many stickers were sent
    if (typeof window.bumpMission === "function" && !window.__stickerAwardedToday) {
      window.bumpMission(4, 1);
      window.__stickerAwardedToday = true;
    }
    if (window.showToast) {
      window.showToast(`${count}명에게 스티커를 전달했어요! ✨`);
    }
  };

  const currentTarget = slots[activeSlot];
  const currentStickers = selectedStickers[activeSlot] || [];
  const isSubmitted = submitted[activeSlot];

  // Count how many slots are ready for batch submit (have stickers + not yet submitted)
  const readyCount = [0, 1, 2].filter(i => slots[i] && (selectedStickers[i] || []).length > 0 && !submitted[i]).length;
  const allDone = slots.every((s, i) => !s || submitted[i]) && slots.some(s => s);

  return (
    <section className="play-main">
      <div className="play-hd">
        <div>
          <h2 style={{marginTop:0, fontSize:28}}>
            통<span className="hanja-small">(通)</span>하는 스티커
          </h2>
          <div className="play-desc">랜덤으로 만난 동료에게 어울리는 스티커 3개까지 골라 마음을 전해보세요. (매일 1회씩 가능)</div>
        </div>
        <button
          className="peek-btn"
          onClick={() => window.openPeekModal && window.openPeekModal('sticker')}
          title="인기 스티커 보기"
        >
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          의견 엿보기
        </button>
      </div>

      {/* picker */}
      <div className="picker">
        <div className="picker-stage">
          {slots.map((s, i) => {
            const stickers = selectedStickers[i] || [];
            const isActive = activeSlot === i && s && !submitted[i];
            return (
              <div
                key={i}
                className={`picker-slot ${s ? 'filled' : 'empty'} ${isSpinning ? 'spinning' : ''} ${isActive ? 'active-slot' : ''}`}
                onClick={() => s && !submitted[i] && setActiveSlot(i)}
              >
                {s ? (
                  <>
                    <div className="av av-photo-slot18" style={{background: AV_BG(s.name)}}>
                      <img src={window.personPhoto(s.name, 120)} alt={s.name}
                           onError={(e) => { e.currentTarget.style.display = 'none'; }} />
                      <span className="av-letter-fallback">{s.initial}</span>
                    </div>
                    <div className="nm-line">
                      <span className="nm">{s.name}</span>
                      <span className="pos">{s.pos}</span>
                    </div>
                    <div className="tm">{s.team}</div>
                    {/* sticker overlay — v7 style at top-right */}
                    {stickers.length > 0 && (
                      <div className="slot-stickers-v7">
                        {stickers.map((sid, k) => {
                          const s2 = STICKERS.find(x => x.id === sid);
                          return (
                            <div
                              key={sid}
                              className="slot-sticker-v7"
                              style={{
                                background: s2.bg,
                                animationDelay: `${k * 0.1}s`,
                              }}
                              title={s2.nm}
                            >
                              <StickerSVG s={s2} size={14} />
                            </div>
                          );
                        })}
                      </div>
                    )}
                    {submitted[i] && (
                      <div style={{
                        position:'absolute', bottom:-6, left:'50%', transform:'translateX(-50%)',
                        background:'var(--mint)', color:'#fff', fontSize:9, fontWeight:700,
                        padding:'2px 8px', borderRadius:999
                      }}>전달완료 ✓</div>
                    )}
                  </>
                ) : (
                  <div className="placeholder" style={{textAlign:'center'}}>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><circle cx="12" cy="8" r="3.5"/><path d="M5 20c1-4 4-6 7-6s6 2 7 6"/></svg>
                    <div>슬롯 {i+1}</div>
                  </div>
                )}
              </div>
            );
          })}
        </div>

        <div className="picker-actions">
          <div className="picker-chances">
            남은 기회 <strong>{chances}</strong> / 3 회
          </div>
          <div style={{display:'flex', gap:8}}>
            <button
              className={`btn primary ${(hasSubmittedToday || chances <= 0) ? 'is-disabled' : ''}`}
              onClick={pick}
              disabled={isSpinning}
            >
              <window.Icon.Dice />
              {isSpinning ? "뽑는 중…" : chances === 3 ? "랜덤 직원 뽑기" : "직원 다시 뽑기"}
            </button>
          </div>
        </div>
      </div>

      {/* sticker palette */}
      <div className="sticker-row">
        <div className="spread" style={{marginBottom: 6}}>
          <div>
            <div className="l" style={{textTransform:'uppercase', letterSpacing:'.06em', fontWeight:700}}>스티커 선택</div>
            <div style={{fontSize:11, color:'var(--ink-3)', marginTop:2}}>
              {currentTarget ? <>지금 <b style={{color:'var(--ink)'}}>{currentTarget.name}</b>님에게 스티커를 붙이는 중 · 최대 3개</> : '먼저 랜덤으로 동료를 선택해 주세요.'}
            </div>
          </div>
          {currentTarget && (
            <div style={{display:'flex', gap:8, alignItems:'center'}}>
              <div style={{display:'flex', gap:6}}>
                {[0,1,2].map(i => (
                  <div key={i} style={{
                    width: 14, height: 14, borderRadius: '50%',
                    background: i < currentStickers.length ? 'var(--coral)' : 'var(--line)',
                    transition:'background .2s'
                  }} />
                ))}
              </div>
              <button
                className="btn primary sm"
                onClick={submitAll}
                disabled={readyCount === 0}
              >
                {allDone ? "전달 완료 ✓" : `스티커 붙이기${readyCount > 0 ? ` (${readyCount})` : ''}`}
              </button>
            </div>
          )}
        </div>
        <div className="sticker-list">
          {STICKERS.map((s) => {
            const selected = currentStickers.includes(s.id);
            return (
              <div
                key={s.id}
                className={`sticker ${selected ? 'selected' : ''}`}
                onClick={() => toggleSticker(s.id)}
              >
                <div className="badge" style={{background: s.bg}}>
                  <StickerSVG s={s} size={22} />
                </div>
                <div className="nm">{s.nm}</div>
                <div className="sticker-tip">{s.desc}</div>
              </div>
            );
          })}
        </div>
      </div>
    </section>
  );
}

// ---------- right side: received stickers ranking ----------
function ReceivedPanel() {
  const received = [
    { id: "wave",       count: 28 },
    { id: "atm",        count: 22 },
    { id: "fountain",   count: 18 },
    { id: "blindspot",  count: 14 },
    { id: "ndim",       count: 11 },
    { id: "awkward",    count: 9 },
    { id: "translate",  count: 7 },
  ];
  const total = received.reduce((s, r) => s + r.count, 0);

  return (
    <aside className="recv">
      <div className="recv-hd">
        <div className="tot">
          <div className="v">{total}</div>
          <div className="l">RECEIVED</div>

        <h3>내가 받은 스티커</h3>
        <div className="sub">이번 달 동료들이 보내준 마음 ✨ (익명)</div>

      <div className="recv-list">
        {received.map((r, i) => {
          const s = STICKERS.find(x => x.id === r.id);
          const rankClass = i === 0 ? 'top1' : i === 1 ? 'top2' : i === 2 ? 'top3' : '';
          return (
            <div key={r.id} className={`recv-item ${rankClass}`}>
              <span className={`rank ${rankClass}`}>
                {i < 3 ? (i === 0 ? '🥇' : i === 1 ? '🥈' : '🥉') : `${i + 1}`}

              <div className="badge" style={{background: s.bg}}>

              <div className="nm">{s.nm}</div>
              <div className="count">{r.count}<span className="u">개</span></div>
            </div>
          );
        })}
      </div>
    </aside>
  );
}

function PlayTab() {
  return (
    <div className="play-grid">
      <PickerPanel />
      <ReceivedPanel />
    </div>
  );
}

window.PlayTab = PlayTab;
})();

  <script type="text/babel" data-presets="react">

// ============================================================

(() => {
const { useState, useRef, useEffect, useMemo } = React;

const CANDIDATES = [
  {

const FREQ_OPTS = ["매일", "주 1회", "격주", "월 1회", "기타"];

const PROPOSALS_SEED = {

  ],

// =========================================================
// Step 01 — 그라운드룰 후보

function Step01({ picked, setPicked, cleared }) {

// =========================================================
// Step 02 — 우리팀이 작성한 실천 제안 (real-time, 3-col)
// =========================================================
function ProposalsList({ proposals, onLeaderSelect, leaderSelectedId, onUpdateProposal, onDeleteProposal }) {
  const [likes, setLikes] = useState({});
  const [editingId, setEditingId] = useState(null);
  const [editHow, setEditHow] = useState("");
  const [editFreq, setEditFreq] = useState("");
  const [editPeriod, setEditPeriod] = useState("");
  const isLeader = D.user && D.user.isLeader;

  const toggleLike = (key) => {
    setLikes({ ...likes, [key]: !likes[key] });
  };

  const startEdit = (p) => {
    setEditingId(p._id);
    setEditHow(p.how || "");
    setEditFreq(p.freq || "");
    setEditPeriod(p.period || "");
  };

  const cancelEdit = () => {
    setEditingId(null);
    setEditHow("");
    setEditFreq("");
    setEditPeriod("");
  };

  const saveEdit = () => {
    if (!editHow.trim() || !editFreq.trim() || !editPeriod.trim()) return;
    if (onUpdateProposal) {
      onUpdateProposal(editingId, {
        how: editHow.trim(),
        freq: editFreq.trim(),
        period: editPeriod.trim(),
      });
    }
    cancelEdit();
  };

  return (
    <section className="rule-step" style={{marginTop: 22}}>
      <header className="spread" style={{marginBottom: 12}}>
        <div>
          <div className="step-label">Step 03</div>
          <h2 style={{margin:0, fontFamily:"var(--f-display)", fontSize:24}}>우리팀이 작성한 실천 제안</h2>
          <p style={{margin:"6px 0 0", fontSize:13.5, color:"var(--ink-3)"}}>
            동료들의 실천 제안에 공감해 주세요. 가장 많은 공감을 받은 제안이 우리의 그라운드 룰이 됩니다.
            {isLeader && <span style={{color:'var(--coral)', fontWeight:700, marginLeft:6}}>· 팀장님은 제안 카드를 클릭하면 최종 그라운드룰로 옮겨집니다.</span>}
          </p>
        </div>
      </header>

      <div className="proposals proposals-3col">
        {CANDIDATES.map((c) => {
          const items = [
            ...(PROPOSALS_SEED[c.id] || []).map((s, i) => ({ ...s, _seedIdx: i })),
            ...(proposals.filter(p => p.candidateId === c.id).map((p, i) => ({ ...p, me: true, _userIdx: i }))),
          ];
          return (
            <div key={c.id} className="prop-group pg-neutral">
              <div className="pg-head">
                <div className="cand-label cand-label-neutral">후보 {c.id}</div>
                <div className="pg-title">{c.text}</div>
              </div>
              <div className="prop-list scroll-y">
                {items.length === 0 && (
                  <div className="empty">아직 등록된 제안이 없어요.</div>
                )}
                {items.map((p, i) => {
                  const key = `${c.id}-${i}`;
                  const liked = likes[key];
                  const baseLikes = (typeof p.likes === 'number') ? p.likes : 0;
                  const propId = p.me ? `user-${c.id}-${p._userIdx}` : `seed-${c.id}-${p._seedIdx}`;
                  const isSelected = leaderSelectedId === propId;
                  const isEditing = p.me && p._id && editingId === p._id;

                  const handleCardClick = (e) => {
                    // Don't trigger card-select when clicking the heart, actions, or while editing
                    if (e.target.closest('.heart')) return;
                    if (e.target.closest('.prop-me-actions')) return;
                    if (e.target.closest('.prop-edit-area')) return;
                    if (isEditing) return;
                    if (!isLeader) return;
                    if (onLeaderSelect) {
                      onLeaderSelect({
                        id: propId,
                        candidateId: c.id,
                        candidateText: c.text,
                        how: p.how,
                        freq: p.freq,
                        period: p.period,
                      });
                    }
                  };

                  return (
                    <div
                      key={key}
                      className={`prop ${isSelected ? 'leader-selected' : ''} ${p.me ? 'is-mine' : ''} ${isLeader && !isEditing ? 'leader-clickable' : ''} ${isEditing ? 'is-editing' : ''}`}
                      onClick={handleCardClick}
                      title={isLeader && !isEditing ? "팀장 권한으로 선택" : undefined}
                    >
                      <div className="top">
                        {p.me && <span className="me-tag">나의 제안</span>}
                        {isSelected && (
                          <span className="prop-selected-tag">
                            <svg viewBox="0 0 24 24" width="9" height="9" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                            팀장 선택
                          </span>
                        )}
                        <span className="top-spacer" />
                        {p.me && !isEditing && (
                          <span className="prop-me-actions" onClick={(e) => e.stopPropagation()}>
                            <button className="pme-act pme-edit" onClick={(e) => { e.stopPropagation(); startEdit(p); }} title="내 의견 수정">
                              <svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="currentColor" strokeWidth="2.3" strokeLinecap="round" strokeLinejoin="round">
                                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                              </svg>
                              수정
                            </button>
                            <button className="pme-act pme-delete" onClick={(e) => { e.stopPropagation(); onDeleteProposal && onDeleteProposal(p._id); }} title="내 의견 삭제">
                              <svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="currentColor" strokeWidth="2.3" strokeLinecap="round" strokeLinejoin="round">
                                <polyline points="3 6 5 6 21 6"/>
                                <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                              </svg>
                              삭제
                            </button>
                          </span>
                        )}
                        <span className={`heart heart-big ${liked ? 'liked' : ''}`} onClick={(e) => { e.stopPropagation(); toggleLike(key); }}>
                          ♥ {baseLikes + (liked ? 1 : 0)}
                        </span>
                      </div>
                      {isEditing ? (
                        <div className="prop-edit-area" onClick={(e) => e.stopPropagation()}>
                          <textarea
                            className="pe-textarea"
                            value={editHow}
                            onChange={(e) => setEditHow(e.target.value)}
                            placeholder="실천 방식"
                            rows={3}
                            autoFocus
                            onKeyDown={(e) => { if (e.key === "Escape") cancelEdit(); }}
                          />
                          <div className="pe-row">
                            <input
                              className="pe-input"
                              value={editFreq}
                              onChange={(e) => setEditFreq(e.target.value)}
                              placeholder="빈도 (예: 주 1회)"
                            />
                            <input
                              className="pe-input"
                              value={editPeriod}
                              onChange={(e) => setEditPeriod(e.target.value)}
                              placeholder="기간 (예: 1개월)"
                            />
                          </div>
                          <div className="pe-actions">
                            <button className="pe-cancel" onClick={cancelEdit}>취소</button>
                            <button className="pe-save" onClick={saveEdit} disabled={!editHow.trim() || !editFreq.trim() || !editPeriod.trim()}>저장</button>
                          </div>
                        </div>
                      ) : (
                        <>
                          <div className="txt">{p.how}</div>
                          <div className="tags">
                            <span className="tag"><em>빈도</em>{p.freq}</span>
                            <span className="tag"><em>기간</em>{p.period}</span>
                          </div>
                        </>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>
    </section>
  );
}

// =========================================================
// Step 03 — 실천 방식 작성 (50자+ → 미션 5)
// =========================================================
function DetailForm({ picked, onSubmit }) {
  const [how, setHow] = useState("");
  const [freq, setFreq] = useState("");
  const [freqEtc, setFreqEtc] = useState("");
  const [period, setPeriod] = useState("");
  const [periodEtc, setPeriodEtc] = useState("");

  const c = CANDIDATES.find(x => x.id === picked);
  if (!c) return null;

  const trimmed = how.trim();
  const isValid = trimmed.length > 0 && freq && period &&
    (freq !== "기타" || freqEtc.trim()) && (period !== "기타" || periodEtc.trim());
  const canCountForMission = trimmed.length >= 30;

  const handleSubmit = () => {
    if (!isValid) return;
    const finalFreq = freq === "기타" ? freqEtc : freq;
    const finalPeriod = period === "기타" ? periodEtc : period;
    onSubmit({ candidateId: picked, how: trimmed, freq: finalFreq, period: finalPeriod, likes: 0 });
    // Mission 5: only counts when how.trim() >= 50 chars
    if (canCountForMission && typeof window.bumpMission === "function") {
      window.bumpMission(5, 1);
    }
    // reset for repeated submissions
    setHow(""); setFreq(""); setFreqEtc(""); setPeriod(""); setPeriodEtc("");
  };

  return (
    <section className="rule-step detail-form" style={{marginTop: 22}}>
      <header className="spread df-header" style={{marginBottom: 12, alignItems:'flex-start'}}>
        <div>
          <div className="step-label">Step 02</div>
          <h2 style={{margin:0, fontFamily:"var(--f-display)", fontSize:24}}>실천 방식 작성</h2>
          <p style={{margin:"6px 0 0", fontSize:13.5, color:"var(--ink-3)"}}>
            위 TOP 3 베스트에 대해 상세 실천 방안을 작성해 주세요. (익명)
          </p>
        </div>
        <button
          className="peek-btn"
          onClick={() => window.openPeekModal && window.openPeekModal('rule')}
          title="다른 조직의 우수 실천 방안 보기"
        >
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          의견 엿보기
        </button>
      </header>

      <div className="picked-rule pr-neutral">
        <div className="cand-label cand-label-neutral">후보 {c.id}</div>
        <div style={{flex:1}}>
          <div className="l">선택한 후보</div>
          <div className="t">{c.text}</div>
        </div>
      </div>

      <div className="fld">
        <label>
          상세 실천 방식<span className="req">*</span>
          <span className={`char-count ${canCountForMission ? 'ok' : ''}`}>
            {trimmed.length} / 30자
          </span>
        </label>
        <textarea
          value={how}
          onChange={(e) => setHow(e.target.value)}
          placeholder="업무 또는 회사생활에 적용하기 위한 상세한 실천 방법을 작성해주세요."
          rows={4}
        />
      </div>

      <div className="fld-row">
        <div className="fld">
          <label>실천 빈도<span className="req">*</span></label>
          <div className="chip-row">
            {FREQ_OPTS.map((f) => (
              <button
                key={f}
                className={`chip-opt ${freq === f ? 'active' : ''}`}
                onClick={() => setFreq(f)}
              >{f}</button>
            ))}
          </div>
          {freq === "기타" && (
            <input
              className="etc-input"
              placeholder="직접 입력 (예: 분기별 1회)"
              value={freqEtc}
              onChange={(e) => setFreqEtc(e.target.value)}
            />
          )}
        </div>
        <div className="fld">
          <label>실천 기간<span className="req">*</span></label>
          <div className="chip-row">
            {PERIOD_OPTS.map((p) => (
              <button
                key={p}
                className={`chip-opt ${period === p ? 'active' : ''}`}
                onClick={() => setPeriod(p)}
              >{p}</button>
            ))}
          </div>
          {period === "기타" && (
            <input
              className="etc-input"
              placeholder="직접 입력 (예: 6개월)"
              value={periodEtc}
              onChange={(e) => setPeriodEtc(e.target.value)}
            />
          )}
        </div>
      </div>

      <div style={{display:'flex', justifyContent:'flex-end', alignItems:'center', marginTop:18, paddingTop:18, borderTop:'1px solid var(--line)'}}>
        <button
          className="btn primary"
          onClick={handleSubmit}
          disabled={!isValid}
        >
          ✨ 내 의견 등록하기 <window.Icon.Arrow />
        </button>
      </div>
    </section>
  );
}

// =========================================================
// Step 04 — 우리팀 최종 그라운드룰 (팀장 권한)
// =========================================================
function ConfirmStep({ prefill }) {
  // List of confirmed rules instead of single boolean
  const [confirmedRules, setConfirmedRules] = useState([]);
  const [rule, setRule] = useState("");
  const [how, setHow] = useState("");
  const [freq, setFreq] = useState("");
  const [period, setPeriod] = useState("");
  const [sourceLabel, setSourceLabel] = useState("");

  // Auto-fill when leader selects a proposal upstream
  useEffect(() => {
    if (prefill) {
      setRule(prefill.rule || "");
      setHow(prefill.how || "");
      setFreq(prefill.freq || "");
      setPeriod(prefill.period || "");
      setSourceLabel(prefill.sourceLabel || "");
    }
  }, [prefill]);

  const canConfirm = rule.trim() && how.trim() && freq.trim() && period.trim();
  const hasAny = confirmedRules.length > 0;

  const handleConfirm = () => {
    if (!canConfirm) return;
    const newRule = {
      id: Date.now(),
      rule: rule.trim(),
      how: how.trim(),
      freq: freq.trim(),
      period: period.trim(),
      sourceLabel,
      confirmedAt: '2026.07.22',
    };
    setConfirmedRules(prev => [...prev, newRule]);
    // Clear the form for next entry
    setRule("");
    setHow("");
    setFreq("");
    setPeriod("");
    setSourceLabel("");
    // Mark mission done on first confirmation
    if (typeof window.markMissionDone === "function") window.markMissionDone(6);
    if (window.showToast) {
      const preview = newRule.rule.length > 18 ? newRule.rule.substring(0, 18) + '…' : newRule.rule;
      window.showToast(`✓ '${preview}' 그라운드룰 확정!`);
    }
  };

  const handleRemoveRule = (id) => {
    const remaining = confirmedRules.filter(r => r.id !== id);
    setConfirmedRules(remaining);
    if (remaining.length === 0) {

              <div className="dt">{p.dt}</div>

            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" width="22" height="22">

function RuleTab() {
  const [picked, setPicked] = useState(1);
  const [proposals, setProposals] = useState([]);
  const [leaderSelectedId, setLeaderSelectedId] = useState(null);
  const [prefill, setPrefill] = useState(null);

  const addProposal = (p) => {
    setProposals(prev => [...prev, { ...p, _id: Date.now() + Math.random() }]);
  };

  const updateProposal = (id, patch) => {
    setProposals(prev => prev.map(p => p._id === id ? { ...p, ...patch } : p));
    if (window.showToast) window.showToast("내 의견을 수정했어요");
  };

  const deleteProposal = (id) => {
    const target = proposals.find(p => p._id === id);
    setProposals(prev => prev.filter(p => p._id !== id));
    // Roll back mission 5 if it was a 30+ char submission
    if (target && (target.how || "").trim().length >= 30 && typeof window.bumpMission === "function") {
      window.bumpMission(5, -1);
    }
    if (window.showToast) window.showToast("내 의견을 삭제했어요");
  };

  // Compute which candidates have user-submitted proposals (for Clear badge)
  const cleared = useMemo(() => {
    const set = new Set();
    proposals.forEach(p => set.add(p.candidateId));
    return set;
  }, [proposals]);

  const handleLeaderSelect = (selection) => {
    setLeaderSelectedId(selection.id);
    setPrefill({
      rule: selection.candidateText,
      how: selection.how,
      freq: selection.freq,
      period: selection.period,
      sourceLabel: `후보 ${selection.candidateId}`,
    });
    // Scroll to the ConfirmStep
    setTimeout(() => {
      try {
        const anchor = document.getElementById('confirm-step-anchor');
        if (anchor && typeof anchor.scrollIntoView === 'function') {
          anchor.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      } catch (e) { /* ignore */ }
    }, 100);
  };

  return (
    <>
      <Step01 picked={picked} setPicked={setPicked} cleared={cleared} />
      <DetailForm picked={picked} onSubmit={addProposal} />
      <ProposalsList
        proposals={proposals}
        onLeaderSelect={handleLeaderSelect}
        leaderSelectedId={leaderSelectedId}
        onUpdateProposal={updateProposal}
        onDeleteProposal={deleteProposal}
      />
      <ConfirmStep prefill={prefill} />
      <PhotoProof />
    </>
  );
}

window.RuleTab = RuleTab;

// ============================================================

const { useState, useMemo, useEffect, useRef } = React;

// ------- icons (small inline) -------
const Icon = {

};

window.Icon = Icon;

// ============================================================
// POINTS STORE — global single source of truth
// ============================================================
window.__points = window.__points || { value: D.user.points };
function usePoints() {
  const [pts, setPts] = useState(window.__points.value);
  useEffect(() => {
    const tick = () => setPts(window.__points.value);
    window.addEventListener("__pts_update", tick);
    return () => window.removeEventListener("__pts_update", tick);
  }, []);
  return [pts, (delta) => {
    window.__points.value += delta;
    window.dispatchEvent(new Event("__pts_update"));
  }];
}
window.usePoints = usePoints;

// ============================================================
// MISSION STORE (v55 mechanics)
// ============================================================
window.__missions = window.__missions || JSON.parse(JSON.stringify(D.missions));

function _bumpPts(delta) {
  window.__points.value += delta;
  window.dispatchEvent(new Event("__pts_update"));
}

window.bumpMission = function(id, delta) {
  delta = delta || 1;
  const t = window.__missions.find(m => m.id === id);
  if (!t || !t.accum) return 0;
  const prevPts = t.accumPts;
  t.accumPts = Math.max(0, t.accumPts + delta * t.perAction);
  t.count = Math.max(0, (t.count || 0) + delta);
  const gained = t.accumPts - prevPts;
  if (gained !== 0) _bumpPts(gained);
  if (!t.done && t.accumPts > 0) t.done = true;
  if (t.accumPts === 0 && t.done) t.done = false;
  window.dispatchEvent(new CustomEvent("__mission_update", { detail: { id, delta: gained } }));
  return gained;
};

window.markMissionDone = function(id) {
  const t = window.__missions.find(m => m.id === id);
  if (!t || t.accum || t.done) return 0;
  t.done = true; t.count = 1;
  const gained = t.fixed || 0;
  if (gained) _bumpPts(gained);
  window.dispatchEvent(new CustomEvent("__mission_update", { detail: { id, delta: gained } }));
  return gained;
};

window.unmarkMissionDone = function(id) {
  const t = window.__missions.find(m => m.id === id);
  if (!t || t.accum || !t.done) return 0;
  t.done = false; t.count = 0;
  const lost = t.fixed || 0;
  if (lost) _bumpPts(-lost);
  window.dispatchEvent(new CustomEvent("__mission_update", { detail: { id, delta: -lost } }));
  return lost;
};

function useMissions() {
  const [snap, setSnap] = useState(() => JSON.parse(JSON.stringify(window.__missions)));
  useEffect(() => {
    const tick = () => setSnap(JSON.parse(JSON.stringify(window.__missions)));
    window.addEventListener("__mission_update", tick);
    return () => window.removeEventListener("__mission_update", tick);
  }, []);
  return snap;
}
window.useMissions = useMissions;

// ============================================================
// KEYWORD DETECTOR (v55 mechanics) — for chat keyword bonuses
// ============================================================
function _escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

window.detectKeywords = function(msg) {
  const matches = [];
  const themesHit = new Set();
  D.themeKeywords.forEach(t => {
    t.words.forEach(w => {
      let idx = msg.indexOf(w);
      while (idx !== -1) {
        matches.push({ start: idx, end: idx + w.length, cls: "kw kw-" + t.cls, themeId: t.id });
        themesHit.add(t.id);
        idx = msg.indexOf(w, idx + w.length);
      }
    });
  });
  let h5Hit = false;
  const lower = msg.toLowerCase();
  D.high5Words.forEach(k => {
    let idx = lower.indexOf(k);
    while (idx !== -1) {
      matches.push({ start: idx, end: idx + k.length, cls: "kw kw-h5", themeId: "h5" });
      h5Hit = true;
      idx = lower.indexOf(k, idx + k.length);
    }
  });
  let html;
  if (matches.length === 0) html = _escapeHtml(msg);
  else {
    matches.sort((a, b) => a.start - b.start || (b.end - b.start) - (a.end - a.start));
    const used = [];
    matches.forEach(m => { if (!used.some(u => !(m.end <= u.start || m.start >= u.end))) used.push(m); });
    used.sort((a, b) => a.start - b.start);
    let cur = 0; html = "";
    used.forEach(m => {
      html += _escapeHtml(msg.slice(cur, m.start));
      html += '<span class="' + m.cls + '">' + _escapeHtml(msg.slice(m.start, m.end)) + '</span>';
      cur = m.end;
    });
    html += _escapeHtml(msg.slice(cur));
  }
  let pts = themesHit.size * 30;
  if (h5Hit) pts += 100;
  let pentagram = false;
  if (themesHit.size === 5) { pts += 500; pentagram = true; }
  return { html, pts, themesHit: [...themesHit], h5Hit, pentagram };
};

function StreakCard() {
  const days = ["월", "화", "수", "목", "금"];
  // Today = 수요일 (Wed = index 2). 월/화 done, 수 today, 목/금 future
  const states = ["done", "done", "today", "", ""];
  // Streak count (D.user.streak is 14, but display uses week-internal count)
  const dayCount = Math.min(D.user.streak, 5);
  const totalDays = 5;
  const fillRatio = dayCount / totalDays;          // 0~1, fraction filled
  const isBlazing = dayCount >= totalDays;

  // SVG ring geometry: outer ring 22 → inner radius 16. We fill the ring from outside in
  // by using an annular path with growing inner cutout opacity.
  // Approach: 2 layered circles — outer ring (always visible faint), then a growing fill ring.
  // Implementation: use stroke-dasharray to fill a ring path along its circumference,
  // OR layer an annular gradient that shrinks.
  // Simpler: stack 5 concentric rings, each lit when its day is reached.
  // Each ring: width 2.2px between radii (outer 22, 19.8, 17.6, 15.4, 13.2, inner core 11).
  const rings = [
    { rOut: 22, rIn: 19.5, threshold: 1 },   // outermost — Day 1
    { rOut: 19.5, rIn: 17,   threshold: 2 },
    { rOut: 17,   rIn: 14.5, threshold: 3 },
    { rOut: 14.5, rIn: 12,   threshold: 4 },
    { rOut: 12,   rIn: 9.5,  threshold: 5 },  // innermost — Day 5 (touches core)
  ];

  // Color per progress level — warms up as it fills
  const ringColor = (level) => {
    if (isBlazing) return "#E0301A";  // all rings red on blaze
    if (level === 1) return "#FFCBA4";
    if (level === 2) return "#FFA475";
    if (level === 3) return "#FF8A5F";
    if (level === 4) return "#FF6B4A";
    return "#E0301A";
  };

  // Inner flame color
  const flameInner = isBlazing ? "#FFEFC8" : "#FFFFFF";
  const flameTip   = isBlazing ? "#FFD580" : "rgba(255,255,255,0.85)";

  return (
    <div className="card streak">
      <div className="streak-top">
        <div>
          <div className="label">연속 참여</div>
          <div className="num">{D.user.streak}<span className="unit">일</span></div>
        </div>
        <div className={`flame-badge flame-progress ${isBlazing ? 'blaze' : ''}`}
             title={isBlazing ? `${dayCount}일 연속 — 활활 타오르는 중!` : `${dayCount}/${totalDays} 일`}>
          <svg viewBox="0 0 48 48" width="48" height="48">
            <defs>
              <radialGradient id="fb-outer-glow" cx="50%" cy="50%" r="50%">
                <stop offset="55%" stopColor={isBlazing ? "#FF1F00" : "#FF6B4A"} stopOpacity={isBlazing ? "0.55" : "0.25"}/>
                <stop offset="100%" stopColor={isBlazing ? "#FF1F00" : "#FF6B4A"} stopOpacity="0"/>
              </radialGradient>
              <radialGradient id="fb-core" cx="50%" cy="50%" r="50%">
                {isBlazing ? (
                  <>
                    <stop offset="0%" stopColor="#FFEFC8"/>
                    <stop offset="50%" stopColor="#FF8A3D"/>
                    <stop offset="100%" stopColor="#E0301A"/>
                  </>
                ) : (
                  <>
                    <stop offset="0%" stopColor="#3D2D5A"/>
                    <stop offset="100%" stopColor="#2A1D45"/>
                  </>
                )}
              </radialGradient>
            </defs>
            {/* Outer glow halo */}
            <circle cx="24" cy="24" r="23" fill="url(#fb-outer-glow)" className="fb-glow" />
            {/* Concentric rings — light up from outside in */}
            {rings.map((ring, i) => {
              const lit = dayCount >= ring.threshold;
              return (
                <circle
                  key={i}
                  cx="24"
                  cy="24"
                  r={(ring.rOut + ring.rIn) / 2}
                  fill="none"
                  stroke={lit ? ringColor(ring.threshold) : "rgba(255,255,255,0.08)"}
                  strokeWidth={ring.rOut - ring.rIn}
                  className={`fb-ring fb-ring-${i+1} ${lit ? 'lit' : ''} ${isBlazing ? 'blazing' : ''}`}
                  style={{ transitionDelay: `${i * 80}ms` }}
                />
              );
            })}
            {/* Inner core */}
            <circle cx="24" cy="24" r="9" fill="url(#fb-core)" className="fb-core" />
            {/* Flame inside core — only fully visible when blazing or near */}
            <path
              d="M24 14.5c.7 3.5 4.6 4.6 4.6 9.6a4.7 4.7 0 0 1-9.4 0c0-1.8 1.4-2.5 1.4-5 0-2.4 1.3-2.7 3.4-4.6z"
              fill={flameInner}
              className={`fb-flame ${isBlazing ? 'flame-blaze' : ''}`}
              opacity={fillRatio >= 0.6 ? 1 : 0.35 + fillRatio * 1.1}
            />
            <path
              d="M24 19c.4 1.6 1.9 2.2 1.9 3.9 0 1.1-.8 2-1.9 2s-1.9-.9-1.9-2c0-.9.6-1.4.6-2.3 0-.8.5-1 1.3-1.6z"
              fill={flameTip}
              className="fb-tip"
              opacity={fillRatio >= 0.6 ? 1 : 0.5}
            />
          </svg>
        </div>
      </div>
      <div className="streak-week">
        {days.map((d, i) => (
          <div key={d} className={`streak-day ${states[i]}`}>{d}</div>
        ))}
      </div>
      <div className="streak-reward">
        <Icon.Sparkle />
        <span>누적 참여 시 <strong>+{D.streakDailyPoints}P</strong> 자동 적립</span>
      </div>
    </div>
  );
}

function MissionCard() {
  const items = useMissions();
  const [bumpKey, setBumpKey] = useState({});

  useEffect(() => {
    const onUpd = (e) => {
      const id = e.detail && e.detail.id;
      if (!id) return;
      setBumpKey(prev => ({ ...prev, [id]: (prev[id] || 0) + 1 }));
    };
    window.addEventListener("__mission_update", onUpd);
    return () => window.removeEventListener("__mission_update", onUpd);
  }, []);

  const earned = items.reduce((s, m) => s + (m.accum ? m.accumPts : (m.done ? (m.fixed || 0) : 0)), 0);

  return (
    <div className="card mission mission-list">
      <div className="card-hd" style={{padding:0, marginBottom:8}}>
        <h3>이달의 미션</h3>
      </div>
      <div className="mission-total">
        <span className="l">달성 포인트</span>
        <span className="v">+{earned.toLocaleString()}<em>p</em></span>
      </div>
      <div className="mission-items">
        {items.map((m) => {
          const count = m.count || 0;
          const acquired = m.accum ? m.accumPts : (m.done ? (m.fixed || 0) : 0);
          const perAct = m.accum ? m.perAction : m.fixed;
          const label = `+${acquired.toLocaleString()}p`;
          return (
            <div
              key={m.id}
              data-mid={m.id}
              className={`mi-row ${m.done ? 'done' : ''}`}
              title={m.accum ? `${m.label} — 액션당 +${m.perAction}P` : `${m.label} — 1회 +${m.fixed}P`}
            >
              <div className="mi-ck">{m.done ? '✓' : ''}</div>
              <div className="mi-nm">{m.label}</div>
              <span className="mi-pts">
                <span key={bumpKey[m.id] || 0} className={`mi-n ${count > 0 ? 'bump' : ''}`}>{label}</span>
                <span className="mi-per">/ +{perAct}p</span>
              </span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function ChatCard() {
  const initialMsgs = [

    { id: 2, who: "system", txt: "이지훈님이 통하는 스티커를 보냈어요 ✨", scope: "system", time: "09:30" },
    { id: 3, who: "이지훈", role: "매니저", txt: "월간 미션 다 같이 인증하시죠!", bg: AV_BG("이지훈"), initial: "지", scope: "all", time: "09:42" },
    { id: 4, who: "최서연", role: "매니저", txt: "RULE 후보 1번 너무 공감…", bg: AV_BG("최서연"), initial: "최", scope: "all", time: "10:14" },
    { id: 5, who: "정현우", role: "책임", txt: "주간 회고는 매주 화요일 어떨까요?", bg: AV_BG("정현우"), initial: "정", scope: "team", time: "10:32" },
    { id: 6, who: "윤서아", role: "매니저", txt: "그라운드룰 후보 1번 너무 공감입니다 ♥", bg: AV_BG("윤서아"), initial: "윤", scope: "all", time: "11:00" },
    { id: 7, who: "system", txt: "TOP 3 후보가 RULE 탭으로 전송되었습니다.", scope: "system", time: "11:18" },
    { id: 8, who: "한지민", role: "책임", txt: "스티커 받으셨어요?", bg: AV_BG("한지민"), initial: "한", scope: "all", time: "11:35" },
    { id: 9, who: "박은영", role: "책임", txt: "1on1 미팅 일정 공유드려요!", bg: AV_BG("박은영"), initial: "박", scope: "team", time: "11:50" },
    { id: 10, who: "system", txt: "박소통 팀장님이 그라운드룰을 확정했습니다", scope: "system", time: "12:02" },
  ];

  const [msgs, setMsgs] = useState(initialMsgs);
  const [filter, setFilter] = useState("all");
  const [draft, setDraft] = useState("");
  const feedRef = useRef(null);

  const now = () => {
    const d = new Date();
    return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  };

  const sendMessage = () => {
    const text = draft.trim();
    if (!text) return;
    const detect = window.detectKeywords(text);
    const time = now();
    const list = [...msgs];
    list.push({
      id: Date.now(),
      who: D.user.name,
      role: D.user.team,
      txt: text,
      html: detect.html,
      pts: detect.pts,
      bg: "linear-gradient(135deg, #FF6B5A, #A78BFA)",
      initial: D.user.initial,
      me: true,
      scope: "team",
      time,
    });
    if (detect.pts > 0) {
      window.__points.value += detect.pts;
      window.dispatchEvent(new Event("__pts_update"));
      const themeNames = D.themeKeywords
        .filter(t => detect.themesHit.includes(t.id))
        .map(t => t.kr)
        .join(" · ");
      const parts = [];
      if (themeNames) parts.push(`「${themeNames}」 +${detect.themesHit.length * 30}P`);
      if (detect.h5Hit) parts.push("HIGH-5 보너스 +100P ✋");
      if (detect.pentagram) parts.push("✦ 5가지 가치 모두 +500P");
      list.push({
        id: Date.now() + 1,
        who: "system",
        txt: `${D.user.name}님 메시지에서 ${parts.join(" · ")}`,
        scope: "system",
        time: now(),
      });
    }
    if (text.length >= 30) window.bumpMission(3, 1);
    setMsgs(list);
    setDraft("");
    setTimeout(() => {
      if (feedRef.current) feedRef.current.scrollTop = feedRef.current.scrollHeight;
    }, 50);
  };

  const filtered = msgs.filter(m => filter === "all" ? true : m.scope === filter);
  const counts = {
    all: msgs.length,
    team: msgs.filter(m => m.scope === "team").length,
    system: msgs.filter(m => m.scope === "system").length,
  };

  return (
    <div className="card chat-card tall">
      <div className="card-hd">
        <h3>전체 채팅방</h3>
        <span className="online"><span className="on-air-dot" />328명 접속</span>
      </div>
      <div className="chat-tabs">
        <button className={`ct ${filter === "all" ? 'active' : ''}`} onClick={() => setFilter("all")}>전체</button>
        <button className={`ct ${filter === "team" ? 'active' : ''}`} onClick={() => setFilter("team")}>우리팀</button>
        <button className={`ct ${filter === "system" ? 'active' : ''}`} onClick={() => setFilter("system")}>시스템</button>
      </div>
      <div className="chat-feed scroll-y" ref={feedRef}>
        {filtered.map((m) =>
          m.scope === "system" ? (
            <div key={m.id} className="chat-msg system">
              <div className="body"><div className="txt">{m.txt}</div></div>
            </div>
          ) : (
            <div key={m.id} className={`chat-msg no-av ${m.me ? 'me' : ''}`}>
              <div className="body">
                <div className={`who ${m.scope === 'team' && !m.me ? 'team-scope' : ''}`}>
                  {m.who}<span className="role">· {m.role}</span>
                  {m.pts > 0 && <span className="pt-tag">+{m.pts}P</span>}
                </div>
                <div className="txt" {...(m.html ? { dangerouslySetInnerHTML: { __html: m.html } } : {})}>
                  {!m.html ? m.txt : null}
                </div>
                {m.time && <div className="time">{m.time}</div>}
              </div>
            </div>
          )
        )}
      </div>
      <div className="chat-input">
        <input
          className="white-input"
          placeholder="메시지를 입력하세요…"
          value={draft}
          onChange={(e) => setDraft(e.target.value)}
          onKeyDown={(e) => e.key === "Enter" && sendMessage()}
        />
        <button className="send" onClick={sendMessage}><Icon.Send /></button>
      </div>
    </div>
  );
}

function Calendar() {
  const dow = ["일", "월", "화", "수", "목", "금", "토"];

  // Months 7-12 in 2026 (start day of week, total days)
  // 2026.07.01 = Wed (3), 31 days
  // 2026.08.01 = Sat (6), 31 days
  // 2026.09.01 = Tue (2), 30 days
  // 2026.10.01 = Thu (4), 31 days
  // 2026.11.01 = Sun (0), 30 days
  // 2026.12.01 = Tue (2), 31 days
  const MONTHS = [
    { name: "July",      n: 7,  start: 3, days: 31 },
    { name: "August",    n: 8,  start: 6, days: 31 },
    { name: "September", n: 9,  start: 2, days: 30 },
    { name: "October",   n: 10, start: 4, days: 31 },
    { name: "November",  n: 11, start: 0, days: 30 },
    { name: "December",  n: 12, start: 2, days: 31 },
  ];

  const [mIdx, setMIdx] = useState(0);
  const [expanded, setExpanded] = useState(false);   // default collapsed
  const month = MONTHS[mIdx];

  // Activity ranges (month-specific). Only July has TALK/PLAY/RULE windows for now.
  // start/end markers shown explicitly on those days
  const ranges = month.n === 7 ? [
    { cls: "coral",  name: "TALK", start: 6,  end: 24 },
    { cls: "lilac",  name: "PLAY", start: 13, end: 24 },
    { cls: "mint",   name: "RULE", start: 20, end: 31 },
  ] : [];

  // build covered/start/end maps
  const covered = {}, starts = {}, ends = {};
  ranges.forEach(r => {
    for (let d = r.start; d <= r.end; d++) (covered[d] = covered[d] || []).push(r.cls);
    (starts[r.start] = starts[r.start] || []).push(r.cls);
    (ends[r.end] = ends[r.end] || []).push(r.cls);
  });

  const cells = [];
  for (let i = 0; i < month.start; i++) cells.push({ off: true });
  for (let d = 1; d <= month.days; d++) {
    cells.push({
      n: d,
      covered: covered[d],
      start: starts[d],
      end: ends[d],
      today: month.n === 7 && d === 14,
    });
  }
  while (cells.length % 7 !== 0) cells.push({ off: true });

  return (
    <div className={`calendar ${expanded ? 'cal-expanded' : 'cal-collapsed'}`}>
      <div className="cal-head">
        <div className="m">
          프로그램 일정
          <em style={{fontStyle:'italic', color:'var(--coral)', fontSize:'12px', fontWeight:600, marginLeft: 8, letterSpacing: '0.04em'}}>
            {month.name === 'July' ? '2026.07' : `2026.${String(MONTHS.indexOf(month)+7).padStart(2,'0')}`}
          </em>
        </div>
        <div className="nav">
          <button onClick={() => setMIdx(Math.max(0, mIdx - 1))} disabled={mIdx === 0}>‹</button>
          <button onClick={() => setMIdx(Math.min(MONTHS.length - 1, mIdx + 1))} disabled={mIdx === MONTHS.length - 1}>›</button>
          <button
            className="cal-toggle"
            onClick={() => setExpanded(!expanded)}
            title={expanded ? "달력 접기" : "달력 펼치기"}
            aria-label={expanded ? "달력 접기" : "달력 펼치기"}
          >
            {expanded ? '▴' : '▾'}
          </button>
        </div>
      </div>
      {expanded && (
        <div className="cal-grid">
          {dow.map((d, i) => <div key={d} className={`dow ${i===0?'sun':i===6?'sat':''}`}>{d}</div>)}
          {cells.map((c, i) => {
            const col = i % 7;
            const dowCls = col === 0 ? 'sun' : col === 6 ? 'sat' : '';
            return (
              <div
                key={i}
                className={`cal-cell ${c.off?'off':''} ${c.today?'today':''} ${dowCls}`}
              >
                {!c.off && <span>{c.n}</span>}
                {c.covered && (
                  <div className="cell-dots">
                    {c.covered.map((cls, j) => <span key={j} className={`cd cd-${cls}`} />)}
                  </div>
                )}
                {c.start && (
                  <div className="cell-markers start">
                    {c.start.map((cls, j) => <span key={j} className={`cm cm-${cls}`} title="시작">▶</span>)}
                  </div>
                )}
                {c.end && (
                  <div className="cell-markers end">
                    {c.end.map((cls, j) => <span key={j} className={`cm cm-${cls}`} title="종료">◀</span>)}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
      {ranges.length > 0 && (
        <div className="cal-schedule cal-schedule-compact">
          <div className="lbl">Quest Timeline</div>
          <div className="gantt gantt-compact">
            {ranges.map(s => {
              const left  = ((s.start - 1) / month.days) * 100;
              const width = ((s.end - s.start + 1) / month.days) * 100;
              return (
                <div key={s.name} className="gantt-row">
                  <div className={`gantt-name ${s.cls}`}>{s.name}</div>
                  <div className="gantt-track">
                    <div className={`gantt-bar ${s.cls}`} style={{ left: `${left}%`, width: `${width}%` }}>
                      {s.start}~{s.end}일
                    </div>
                  </div>
                </div>
              );
            })}
          </div>

  );
}

// HERO v18 — Scatter → form people → walk toward each other → raise hands → HIGH-5 → reverse → loop
// ============================================================
function ClapHi5Constellation() {

  // 4 position states: REST (scatter) → STAND_FAR (apart, arms down) → STAND_CLOSE (close, arms still down) → HI5 (close, arms up, hands meet)

  // LEFT — STAND_FAR (body center 180, 200)

    [180, 130], [182, 150], [177, 138], [184, 137],
    [180, 165], [180, 185], [180, 205],
    [168, 175], [165, 200], [163, 225],   // L-arm down
    [192, 175], [195, 200], [197, 225],   // R-arm down
    [172, 265], [188, 265],
  ];
  // LEFT — STAND_CLOSE (body center 250, 200 — closer to center, arms still down)
  const STAND_CLOSE_LEFT = [
    [250, 130], [252, 150], [247, 138], [254, 137],
    [250, 165], [250, 185], [250, 205],
    [238, 175], [235, 200], [233, 225],
    [262, 175], [265, 200], [267, 225],
    [242, 265], [258, 265],

  // LEFT — HI5 (body center 250, leans right, R-arm UP reaching center top)
  const HI5_LEFT = [
    [253, 125], [255, 145], [250, 132], [257, 132],
    [253, 160], [256, 180], [259, 200],
    [240, 170], [235, 195], [232, 222],   // L-arm down
    [268, 165], [285, 138], [298, 110],   // R-arm raised → HIGH-5 spot
    [243, 263], [263, 263],
  ];
  // RIGHT — mirror around x=300 (viewBox center)
  const STAND_FAR_RIGHT = STAND_FAR_LEFT.map(([x, y]) => [600 - x, y]);
  const STAND_CLOSE_RIGHT = STAND_CLOSE_LEFT.map(([x, y]) => [600 - x, y]);
  const HI5_RIGHT = HI5_LEFT.map(([x, y]) => [600 - x, y]);

  const STAND_FAR = [...STAND_FAR_LEFT, ...STAND_FAR_RIGHT];
  const STAND_CLOSE = [...STAND_CLOSE_LEFT, ...STAND_CLOSE_RIGHT];
  const HI5 = [...HI5_LEFT, ...HI5_RIGHT];

  // REST — random scattered

    [340, 30], [380, 70], [420, 40], [460, 65], [500, 35], [540, 65], [570, 40],
    [50, 130], [120, 175], [200, 110], [260, 170], [320, 115], [380, 175], [440, 110],
    [510, 175], [560, 130], [30, 215], [90, 260], [160, 230], [220, 270], [290, 225],
    [350, 270], [410, 225],
  ];

  const offsetR = STAND_FAR_LEFT.length;
  const BONES = [
    [0, 1], [1, 4], [4, 5], [5, 6],
    [4, 7], [7, 8], [8, 9],
    [4, 10], [10, 11], [11, 12],
    [6, 13], [6, 14],
    [offsetR + 0, offsetR + 1],
    [offsetR + 1, offsetR + 4],
    [offsetR + 4, offsetR + 5],
    [offsetR + 5, offsetR + 6],
    [offsetR + 4, offsetR + 7],
    [offsetR + 7, offsetR + 8],
    [offsetR + 8, offsetR + 9],
    [offsetR + 4, offsetR + 10],
    [offsetR + 10, offsetR + 11],
    [offsetR + 11, offsetR + 12],
    [offsetR + 6, offsetR + 13],
    [offsetR + 6, offsetR + 14],
    [12, offsetR + 9],   // HI-5
  ];
  const HAND_IDX = new Set([12, offsetR + 9]);
  const FACE_IDX = new Set([2, 3, offsetR + 2, offsetR + 3]);

  return (
    <svg className="clap-svg" viewBox="0 0 600 300" preserveAspectRatio="xMidYMid slice">

          <stop offset="35%" stopColor="#FF6B5A" stopOpacity=".6"/>

        <radialGradient id="clapStarGrad" cx="50%" cy="50%" r="50%">
          <stop offset="0%"  stopColor="#fff" stopOpacity="1"/>
          <stop offset="60%" stopColor="#FBE38A" stopOpacity=".9"/>
          <stop offset="100%" stopColor="#FBE38A" stopOpacity="0"/>
        </radialGradient>
        <filter id="clapStarGlow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="1.5"/>

      </defs>

      <circle className="clap-halo" cx="300" cy="110" r="38" fill="url(#hi5HaloGrad)" />
      <g className="clap-rays" transform="translate(300, 110)">
        {Array.from({ length: 12 }).map((_, i) => (
          <line key={i}
            x1="0" y1="0"
            x2={Math.cos(i * Math.PI / 6) * 28}
            y2={Math.sin(i * Math.PI / 6) * 28}

        {/* Accent yellow/orange triangle (smaller, offset left) */}

          points="280,98 254,175 308,175"
          fill="rgba(232, 178, 71, 0.32)"
          stroke="rgba(232, 178, 71, 0.85)"
          strokeWidth="1.4"
          strokeLinejoin="round"
        />
        {/* Main green triangle */}
        <polygon className="hmk-main"
          points="300,108 268,170 332,170"
          fill="rgba(46, 157, 110, 0.32)"
          stroke="rgba(46, 157, 110, 0.95)"
          strokeWidth="1.6"
          strokeLinejoin="round"
        />
      </g>

      {/* Bones for each phase */}
      <g className="clap-bones">
        {BONES.map((b, i) => {
          const isHi5Hand = (b[0] === 12 && b[1] === offsetR + 9);
          if (isHi5Hand) {
            const aHi5 = HI5[b[0]], cHi5 = HI5[b[1]];
            return <line key={i} className="clap-hi5-bone"
                         x1={aHi5[0]} y1={aHi5[1]} x2={cHi5[0]} y2={cHi5[1]} />;
          }
          const aFar = STAND_FAR[b[0]], cFar = STAND_FAR[b[1]];
          const aClose = STAND_CLOSE[b[0]], cClose = STAND_CLOSE[b[1]];
          const aHi5 = HI5[b[0]], cHi5 = HI5[b[1]];
          return (
            <g key={i}>
              <line className="clap-bone clap-bone-far" x1={aFar[0]} y1={aFar[1]} x2={cFar[0]} y2={cFar[1]} />
              <line className="clap-bone clap-bone-close" x1={aClose[0]} y1={aClose[1]} x2={cClose[0]} y2={cClose[1]} />
              <line className="clap-bone clap-bone-hi5" x1={aHi5[0]} y1={aHi5[1]} x2={cHi5[0]} y2={cHi5[1]} />
            </g>

      </g>

      <g className="clap-stars">
        {STAND_FAR.map((farPos, i) => {
          const restPos = REST[i % REST.length];
          const closePos = STAND_CLOSE[i];
          const hi5Pos = HI5[i];
          const fdx = farPos[0] - restPos[0];
          const fdy = farPos[1] - restPos[1];
          const cdx = closePos[0] - restPos[0];
          const cdy = closePos[1] - restPos[1];
          const hdx = hi5Pos[0] - restPos[0];
          const hdy = hi5Pos[1] - restPos[1];
          const isHand = HAND_IDX.has(i);
          const isFace = FACE_IDX.has(i);
          return (
            <g key={i} className="clap-star-wrap" style={{
              "--far-dx": `${fdx}px`,
              "--far-dy": `${fdy}px`,
              "--close-dx": `${cdx}px`,
              "--close-dy": `${cdy}px`,
              "--hi5-dx": `${hdx}px`,
              "--hi5-dy": `${hdy}px`,
            }}>
              <circle
                cx={restPos[0]} cy={restPos[1]}
                r={isHand ? 3.3 : isFace ? 1.1 : 2.3}
                fill={isFace ? "#FBE38A" : "url(#clapStarGrad)"}
                filter="url(#clapStarGlow)"
                className={`clap-star ${isHand ? 'clap-hand-star' : ''} ${isFace ? 'clap-face-star' : ''}`}
              />
              <circle
                cx={restPos[0]} cy={restPos[1]}
                r={isHand ? 1.5 : isFace ? 0.5 : 0.9}
                fill="#fff"
                opacity="0.9"
              />
            </g>
          );
        })}
      </g>

      <g className="clap-bg-stars">
        {Array.from({ length: 18 }).map((_, i) => {
          const x = (i * 47 + 17) % 600;
          const y = (i * 31 + 23) % 300;
          return (
            <circle key={i} cx={x} cy={y} r={0.8}
              fill="#fff" opacity="0.4"
              className="clap-bg-tw"
              style={{ animationDelay: `${(i * 0.21) % 4}s` }} />
          );
        })}
      </g>
    </svg>
  );
}

// ============================================================
// HERO v23 — Interactive shader wallpaper (mouse-reactive aurora + click ripples)
// Robust: resize each frame, vibrant orbs, no canvas cursor change
// ============================================================
function InteractiveShader() {
  const canvasRef = useRef(null);
  const mouseRef = useRef({ x: 0.5, y: 0.5, active: false, tx: 0.5, ty: 0.5 });
  const ripplesRef = useRef([]);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    if (!ctx) return;
    let rafId;
    let t = 0;
    const dpr = Math.min(window.devicePixelRatio || 1, 2);

    // 5 vibrant orbs on dark bg
    const orbs = [
      { hx: 0.18, hy: 0.32, ax: 0.13, ay: 0.18, sp: 0.55, color: [255, 120, 90],  size: 260 },  // coral
      { hx: 0.78, hy: 0.55, ax: 0.10, ay: 0.13, sp: 0.42, color: [180, 130, 255], size: 290 },  // lilac
      { hx: 0.45, hy: 0.82, ax: 0.18, ay: 0.10, sp: 0.66, color: [255, 200, 80],  size: 240 },  // gold
      { hx: 0.62, hy: 0.18, ax: 0.14, ay: 0.10, sp: 0.51, color: [80, 220, 180],  size: 220 },  // mint
      { hx: 0.30, hy: 0.62, ax: 0.12, ay: 0.16, sp: 0.38, color: [255, 150, 110], size: 250 },  // peach
    ];

    const draw = () => {
      // Resize each frame — guarantees correct dims even after layout shifts
      const rect = canvas.getBoundingClientRect();
      const targetW = Math.max(1, Math.floor(rect.width * dpr));
      const targetH = Math.max(1, Math.floor(rect.height * dpr));
      if (canvas.width !== targetW || canvas.height !== targetH) {
        canvas.width = targetW;
        canvas.height = targetH;
      }
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      const w = rect.width;
      const h = rect.height;

      t += 0.009;

      // Smooth mouse follow
      mouseRef.current.tx += (mouseRef.current.x - mouseRef.current.tx) * 0.08;
      mouseRef.current.ty += (mouseRef.current.y - mouseRef.current.ty) * 0.08;

      // Clear with deep plum base — dark canvas for orbs to glow against
      ctx.globalCompositeOperation = 'source-over';
      const baseGrad = ctx.createLinearGradient(0, 0, w, h);
      baseGrad.addColorStop(0, '#241634');
      baseGrad.addColorStop(0.5, '#382254');
      baseGrad.addColorStop(1, '#4A2C6F');
      ctx.fillStyle = baseGrad;
      ctx.fillRect(0, 0, w, h);

      // Orbs (additive blend for glow)
      ctx.globalCompositeOperation = 'lighter';
      orbs.forEach((orb, i) => {
        let cx = orb.hx + Math.sin(t * orb.sp + i * 1.3) * orb.ax;
        let cy = orb.hy + Math.cos(t * orb.sp * 0.85 + i * 0.7) * orb.ay;
        if (mouseRef.current.active) {
          const pull = 0.25;
          cx += (mouseRef.current.tx - cx) * pull;
          cy += (mouseRef.current.ty - cy) * pull;
        }
        const px = cx * w;
        const py = cy * h;
        const [r, g, b] = orb.color;
        const breathe = orb.size + Math.sin(t * 1.4 + i) * 18;
        const grad = ctx.createRadialGradient(px, py, 0, px, py, breathe);
        grad.addColorStop(0,    `rgba(${r}, ${g}, ${b}, 0.85)`);
        grad.addColorStop(0.4,  `rgba(${r}, ${g}, ${b}, 0.35)`);
        grad.addColorStop(0.75, `rgba(${r}, ${g}, ${b}, 0.10)`);
        grad.addColorStop(1,    `rgba(${r}, ${g}, ${b}, 0)`);
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, w, h);
      });

      // Mouse spotlight
      if (mouseRef.current.active) {
        const mx = mouseRef.current.tx * w;
        const my = mouseRef.current.ty * h;
        const gr = ctx.createRadialGradient(mx, my, 0, mx, my, 130);
        gr.addColorStop(0,   'rgba(255, 245, 220, 0.45)');
        gr.addColorStop(0.5, 'rgba(255, 220, 170, 0.15)');
        gr.addColorStop(1,   'rgba(255, 255, 255, 0)');
        ctx.fillStyle = gr;
        ctx.fillRect(0, 0, w, h);
      }

      // Click ripples
      ripplesRef.current = ripplesRef.current.filter(rp => {
        rp.age += 1;
        if (rp.age > 80) return false;
        const radius = rp.age * 5;
        const alpha = (1 - rp.age / 80) * 0.6;
        ctx.strokeStyle = `rgba(255, 230, 180, ${alpha})`;
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.arc(rp.x * w, rp.y * h, radius, 0, Math.PI * 2);
        ctx.stroke();
        ctx.strokeStyle = `rgba(200, 150, 255, ${alpha * 0.75})`;
        ctx.lineWidth = 1.6;
        ctx.beginPath();
        ctx.arc(rp.x * w, rp.y * h, radius * 0.65, 0, Math.PI * 2);
        ctx.stroke();
        return true;
      });

      rafId = requestAnimationFrame(draw);
    };
    rafId = requestAnimationFrame(draw);

    const parent = canvas.parentElement;
    if (!parent) return () => cancelAnimationFrame(rafId);

    const onMove = (e) => {
      const rect = parent.getBoundingClientRect();
      mouseRef.current.x = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
      mouseRef.current.y = Math.max(0, Math.min(1, (e.clientY - rect.top) / rect.height));
      mouseRef.current.active = true;
    };
    const onLeave = () => { mouseRef.current.active = false; };
    const onClick = (e) => {
      const rect = parent.getBoundingClientRect();
      ripplesRef.current.push({
        x: (e.clientX - rect.left) / rect.width,
        y: (e.clientY - rect.top) / rect.height,
        age: 0,
      });
    };
    parent.addEventListener('mousemove', onMove);
    parent.addEventListener('mouseleave', onLeave);
    parent.addEventListener('click', onClick);

    return () => {
      cancelAnimationFrame(rafId);
      parent.removeEventListener('mousemove', onMove);
      parent.removeEventListener('mouseleave', onLeave);
      parent.removeEventListener('click', onClick);
    };
  }, []);

  return <canvas ref={canvasRef} className="hero-shader-canvas" />;
}

// BACKGROUND STARS — Rising starlight (dark tones for cream bg contrast)
// ============================================================
function BackgroundStars() {
  // 200 stars scattered randomly with gold/green dominant palette + larger drift orbits
  const stars = useMemo(() => Array.from({ length: 200 }).map((_, i) => {
    const seed = i * 73 + 17;
    const xRaw = (seed * 13) % 1000;
    const yRaw = (seed * 29) % 1000;
    const dxRaw = (seed * 41) % 100;
    const dyRaw = (seed * 67) % 100;
    // Tone distribution: 35% gold, 30% green, 20% white, 15% lavender accent
    const toneRoll = (seed * 19) % 100;
    let tone;
    if (toneRoll < 35) tone = 2;        // gold
    else if (toneRoll < 65) tone = 4;   // green (new)
    else if (toneRoll < 85) tone = 0;   // white
    else tone = 1;                       // lavender
    return {
      id: i,
      x: xRaw / 10,
      y: yRaw / 10,
      delay: -((seed * 7) % 30),
      duration: 10 + ((seed * 3) % 16),   // 10-26s drift orbit (slower, more graceful)
      size: 1.5 + ((seed % 5) === 0 ? 2.2 : (seed % 3) * 0.8),  // 1.5-3.7px
      tone,
      driftX: (dxRaw - 50) * 1.1,         // -55px to +55px (larger range!)
      driftY: (dyRaw - 50) * 1.1,
      twinkleDur: 1.8 + ((seed * 17) % 38) / 10,  // 1.8-5.6s
    };
  }), []);
  return (
    <div className="bg-stars" aria-hidden="true">
      {stars.map(s => (
        <div key={s.id} className={`bg-star bg-star-${s.tone}`}
          style={{
            left: `${s.x}%`,
            top: `${s.y}%`,
            width: `${s.size}px`,
            height: `${s.size}px`,
            animationDelay: `${s.delay}s, ${s.delay * 0.7}s`,
            animationDuration: `${s.duration}s, ${s.twinkleDur}s`,
            "--driftX": `${s.driftX}px`,
            "--driftY": `${s.driftY}px`,
          }}
        />
      ))}
    </div>
  );
}

  <script>
// Cosmic interactions — mouse parallax on starfields & moons
(function () {
  const apply = (el, x, y, strength) => {
    el.style.transform = `translate(${x * strength}px, ${y * strength}px)`;
    el.style.transition = "transform 0.5s cubic-bezier(.2,.6,.2,1)";
  };

  function bind(container) {
    if (container.__cosmicBound) return;
    container.__cosmicBound = true;
    const stars = container.querySelector(".starfield");
    const moon = container.querySelector(".moon");
    const aurora = container.querySelector(".aurora");

    container.addEventListener("mousemove", (e) => {
      const r = container.getBoundingClientRect();
      const x = (e.clientX - r.left) / r.width - 0.5;
      const y = (e.clientY - r.top) / r.height - 0.5;
      if (stars) apply(stars, x, y, 14);
      if (aurora) apply(aurora, x, y, 8);
      if (moon) {
        moon.style.transition = "transform 0.6s cubic-bezier(.2,.6,.2,1)";
        moon.style.transform = `translate(${x * -10}px, ${y * -6}px)`;
      }
    });

    container.addEventListener("mouseleave", () => {
      if (stars) { stars.style.transform = ""; }
      if (aurora) { aurora.style.transform = ""; }
      if (moon) { moon.style.transform = ""; }
    });
  }

  // observe DOM and bind to cosmic containers
  function scan() {
    document.querySelectorAll(".hero, .char, .group-chat, .confirmed")
      .forEach(bind);
  }

  // initial + delayed scans for React mount
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", scan);
  } else {
    scan();
  }
  setTimeout(scan, 300);
  setTimeout(scan, 1200);

  // observe for new mounts
  new MutationObserver(() => scan()).observe(document.body, { childList: true, subtree: true });
})();

  </script>
